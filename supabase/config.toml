[api]
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
port = 54323

[inbucket]
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
file_size_limit = "50MiB"

[auth]
site_url = "http://localhost:5173"
additional_redirect_urls = ["https://markuce.com"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true

[functions.create-payment-link]
verify_jwt = true

[functions.verify-payment]
verify_jwt = false

[functions.webhook-dispatcher]
verify_jwt = false

[functions.stripe-webhook]
verify_jwt = false

[functions.update-webhook]
verify_jwt = true

[functions.rotate-api-keys]
verify_jwt = true

[functions.start-kyc]
verify_jwt = true
